<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>MeinBudget</title>
    
    <!-- Manifest für PWA/APK (Base64 kodiert für die Einzeldatei-Lösung) -->
    <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiTWVpbkJ1ZGdldCIsInNob3J0X25hbWUiOiJCdWRnZXQiLCJzdGFydF91cmwiOiIuIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiIzAwMDAwMCIsInRoZW1lX2NvbG9yIjoiIzAwMDAwMCIsImljb25zIjpbeyJzcmMiOiJodHRwczovL2Nkbi1pY29ucy1wbmcuZmxhdGljb24uY29tLzUxMi8yNDg5LzI0ODk3MTgucG5nIiwic2l6ZXMiOiI1MTJ4NTEyIiwidHlwZSI6ImltYWdlL3BuZyIsInB1cnBvc2UiOiJhbnkgbWFza2FibGUifV19">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAvkTQNolf85Q-_WZiC_HrLNYJ2DArBVvo",
            authDomain: "meinbudget-bca94.firebaseapp.com",
            projectId: "meinbudget-bca94",
            storageBucket: "meinbudget-bca94.firebasestorage.app",
            messagingSenderId: "66530115679",
            appId: "1:66530115679:web:f07803aa3a9e068e205bea"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'meinbudget-bca94';

        // State
        let currentUser = null;
        let transactions = [];
        let recurring = [];
        let activeTab = 'einnahmen';

        // Styles
        const style = document.createElement('style');
        style.textContent = `
            @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
            body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000; color: #fff; -webkit-tap-highlight-color: transparent; }
            .glass { background: rgba(23, 23, 23, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
            .blue-gradient { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); }
            .blue-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
            .no-scrollbar::-webkit-scrollbar { display: none; }
            input, button { outline: none !important; }
        `;
        document.head.appendChild(style);

        // Auth
        window.login = () => signInWithPopup(auth, new GoogleAuthProvider());
        window.logout = () => signOut(auth).then(() => window.location.reload());

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-img').src = user.photoURL;
                subscribeToData();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        function subscribeToData() {
            if (!currentUser) return;
            onSnapshot(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'transactions'), (s) => {
                transactions = s.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            });
            onSnapshot(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'recurring'), (s) => {
                recurring = s.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            });
        }

        window.saveItem = async () => {
            const title = document.getElementById('input-title').value;
            const amount = parseFloat(document.getElementById('input-amount').value);
            const date = document.getElementById('input-date').value;
            const day = parseInt(document.getElementById('input-day').value);
            const isRecurring = document.getElementById('input-recurring-check')?.checked;

            if (!title || isNaN(amount)) return;

            if (activeTab === 'fixkosten' || (activeTab === 'sparen' && isRecurring)) {
                await addDoc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'recurring'), {
                    title, amount, type: activeTab, day: day || 1, createdAt: new Date().toISOString()
                });
            } else {
                await addDoc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'transactions'), {
                    title, amount, type: activeTab, date: date || new Date().toISOString().split('T')[0], paid: false, createdAt: new Date().toISOString()
                });
            }
            closeModal();
        };

        window.deleteItem = async (id, isRec) => {
            const col = isRec ? 'recurring' : 'transactions';
            await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, col, id));
        };

        window.markAsPaid = async (id) => {
            const ref = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'transactions', id);
            await updateDoc(ref, { type: 'archiv', paid: true, paidAt: new Date().toISOString() });
        };

        window.switchTab = (tab) => { activeTab = tab; render(); };

        window.openModal = () => {
            document.getElementById('modal-overlay').classList.remove('hidden');
            const recToggle = document.getElementById('recurring-toggle-container');
            const dateContainer = document.getElementById('date-container');
            const dayContainer = document.getElementById('day-container');

            recToggle.classList.add('hidden');
            dateContainer.classList.remove('hidden');
            dayContainer.classList.add('hidden');

            if (activeTab === 'fixkosten') {
                dateContainer.classList.add('hidden');
                dayContainer.classList.remove('hidden');
            } else if (activeTab === 'sparen') {
                recToggle.classList.remove('hidden');
                toggleRecurringFields();
            }
        };

        window.toggleRecurringFields = () => {
            const isRec = document.getElementById('input-recurring-check').checked;
            document.getElementById('date-container').classList.toggle('hidden', isRec);
            document.getElementById('day-container').classList.toggle('hidden', !isRec);
        };

        window.closeModal = () => {
            document.getElementById('modal-overlay').classList.add('hidden');
            ['input-title', 'input-amount', 'input-day'].forEach(id => document.getElementById(id).value = '');
        };

        window.handleScan = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('scan-loader').classList.remove('hidden');
            try {
                const worker = await Tesseract.createWorker('deu');
                const { data: { text } } = await worker.recognize(file);
                await worker.terminate();
                
                const prices = text.match(/\d+[\.,]\d{2}/g);
                const amount = prices ? Math.max(...prices.map(p => parseFloat(p.replace(',', '.')))) : 0;
                const lines = text.split('\n').filter(l => l.length > 3);
                
                document.getElementById('input-title').value = lines[0] || "Beleg Scan";
                document.getElementById('input-amount').value = amount;

                // Datumsextraktion (Einfach)
                const dateMatch = text.match(/(\d{1,2})\.(\d{1,2})\.(\d{2,4})/);
                if (dateMatch) {
                    let d = dateMatch[1].padStart(2, '0');
                    let m = dateMatch[2].padStart(2, '0');
                    let y = dateMatch[3].length === 2 ? '20'+dateMatch[3] : dateMatch[3];
                    document.getElementById('input-date').value = `${y}-${m}-${d}`;
                }

                document.getElementById('scan-loader').classList.add('hidden');
            } catch (err) {
                alert("Fehler beim Scan");
                document.getElementById('scan-loader').classList.add('hidden');
            }
        };

        const formatCHF = (v) => v.toLocaleString('de-CH', { style: 'currency', currency: 'CHF' });

        function render() {
            const list = document.getElementById('list-container');
            const now = new Date();
            const currentMonth = now.getMonth();

            const incomeMonth = transactions.filter(t => t.type === 'einnahmen' && new Date(t.date).getMonth() === currentMonth).reduce((a, b) => a + b.amount, 0);
            const fixCosts = recurring.filter(r => r.type === 'fixkosten').reduce((a, b) => a + b.amount, 0);
            const openBills = transactions.filter(t => t.type === 'rechnungen' && new Date(t.date).getMonth() === currentMonth).reduce((a, b) => a + b.amount, 0);
            const savingsTotal = recurring.filter(r => r.type === 'sparen').reduce((a, b) => a + b.amount, 0) + 
                                transactions.filter(t => t.type === 'sparen' && new Date(t.date).getMonth() === currentMonth).reduce((a, b) => a + b.amount, 0);

            const potential = incomeMonth - fixCosts - openBills - savingsTotal;

            document.getElementById('display-income').innerText = formatCHF(incomeMonth);
            document.getElementById('display-potential').innerText = formatCHF(potential);

            document.querySelectorAll('.tab-btn').forEach(b => {
                const active = b.getAttribute('data-tab') === activeTab;
                b.className = `tab-btn px-4 py-2 rounded-xl text-xs font-bold transition-all flex-shrink-0 ${active ? 'blue-gradient text-white blue-glow' : 'text-slate-400 hover:bg-white/5'}`;
            });

            if (activeTab === 'ubersicht') {
                document.getElementById('add-btn').classList.add('hidden');
                renderOverview(list);
                return;
            }
            document.getElementById('add-btn').classList.remove('hidden');

            let items = activeTab === 'fixkosten' ? recurring.filter(r => r.type === 'fixkosten') : 
                        activeTab === 'sparen' ? [...recurring.filter(r => r.type === 'sparen'), ...transactions.filter(t => t.type === 'sparen')] :
                        transactions.filter(t => t.type === activeTab);

            if (items.length === 0) {
                list.innerHTML = `<div class="py-20 text-center text-slate-500">Keine Einträge.</div>`;
                return;
            }

            list.innerHTML = items.map(i => `
                <div class="glass p-4 rounded-2xl flex justify-between items-center mb-3">
                    <div>
                        <h4 class="font-bold text-sm">${i.title}</h4>
                        <div class="text-[10px] text-slate-500 mt-1">
                            <span class="text-blue-400 font-bold">${formatCHF(i.amount)}</span>
                            ${i.day ? ` • Monatlich am ${i.day}.` : ` • ${new Date(i.date).toLocaleDateString('de-CH')}`}
                        </div>
                    </div>
                    <div class="flex gap-2">
                        ${i.type === 'rechnungen' ? `<button onclick="markAsPaid('${i.id}')" class="p-2 bg-emerald-500/10 text-emerald-500 rounded-lg">✓</button>` : ''}
                        <button onclick="deleteItem('${i.id}', ${!!i.day})" class="p-2 bg-rose-500/10 text-rose-500 rounded-lg">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function renderOverview(container) {
            container.innerHTML = `
                <div class="glass p-6 rounded-3xl mb-4">
                    <h3 class="font-bold mb-4">Fix-Belastung / Monat</h3>
                    <div class="space-y-2 text-sm">
                        <div class="flex justify-between"><span>Fixkosten</span><span class="text-rose-400">-${formatCHF(recurring.filter(r => r.type === 'fixkosten').reduce((a,b)=>a+b.amount,0))}</span></div>
                        <div class="flex justify-between"><span>Fixes Sparen</span><span class="text-emerald-400">-${formatCHF(recurring.filter(r => r.type === 'sparen').reduce((a,b)=>a+b.amount,0))}</span></div>
                    </div>
                </div>
            `;
        }
    </script>
</head>
<body class="pb-24 overflow-x-hidden">

    <div id="scan-loader" class="fixed inset-0 z-[200] bg-black/80 backdrop-blur-md hidden flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-sm font-bold">Analysiere Beleg...</p>
    </div>

    <div id="login-screen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center p-6 bg-black">
        <div class="w-20 h-20 blue-gradient rounded-3xl mb-8 blue-glow flex items-center justify-center text-white">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </div>
        <h1 class="text-3xl font-extrabold mb-8">Mein<span class="text-blue-500">Budget</span></h1>
        <button onclick="window.login()" class="w-full max-w-xs px-8 py-4 bg-white text-black font-bold rounded-2xl">Mit Google anmelden</button>
    </div>

    <div id="main-app" class="hidden max-w-2xl mx-auto px-6 pt-6">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-xl font-bold italic tracking-tighter">MEIN<span class="text-blue-500">BUDGET</span></h1>
            <div class="flex items-center gap-3">
                <div class="text-right leading-tight"><p id="user-name" class="text-[10px] font-bold text-slate-400"></p><button onclick="window.logout()" class="text-[9px] text-blue-500 uppercase font-black">Abmelden</button></div>
                <img id="user-img" class="w-9 h-9 rounded-full border border-white/10">
            </div>
        </header>

        <div class="grid grid-cols-1 gap-4 mb-8">
            <div class="glass p-6 rounded-[2rem] relative overflow-hidden">
                <div class="absolute -right-4 -top-4 w-20 h-20 bg-blue-500/5 rounded-full blur-2xl"></div>
                <p class="text-slate-500 text-[10px] uppercase font-bold mb-1">Verfügbar (Lohn)</p>
                <h2 id="display-income" class="text-2xl font-black">CHF 0.00</h2>
            </div>
            <div class="blue-gradient p-6 rounded-[2rem] blue-glow">
                <p class="text-white/60 text-[10px] uppercase font-bold mb-1">Freies Sparpotenzial</p>
                <h2 id="display-potential" class="text-3xl font-black">CHF 0.00</h2>
            </div>
        </div>

        <nav class="flex gap-1 overflow-x-auto pb-4 no-scrollbar mb-6">
            <button onclick="switchTab('einnahmen')" data-tab="einnahmen" class="tab-btn">Einnahmen</button>
            <button onclick="switchTab('fixkosten')" data-tab="fixkosten" class="tab-btn">Fixkosten</button>
            <button onclick="switchTab('rechnungen')" data-tab="rechnungen" class="tab-btn">Offen</button>
            <button onclick="switchTab('sparen')" data-tab="sparen" class="tab-btn">Sparen</button>
            <button onclick="switchTab('archiv')" data-tab="archiv" class="tab-btn">Archiv</button>
            <button onclick="switchTab('ubersicht')" data-tab="ubersicht" class="tab-btn">Übersicht</button>
        </nav>

        <div id="list-container" class="pb-20"></div>

        <button id="add-btn" onclick="openModal()" class="fixed bottom-6 right-6 w-14 h-14 blue-gradient rounded-full blue-glow flex items-center justify-center text-3xl shadow-2xl z-40 active:scale-90 transition-transform">
            <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"></path></svg>
        </button>

        <div id="modal-overlay" class="fixed inset-0 bg-black/90 backdrop-blur-md z-50 flex items-end md:items-center justify-center hidden p-0 md:p-6">
            <div class="bg-[#111] w-full max-w-lg p-6 rounded-t-[2.5rem] md:rounded-[2.5rem] border-t border-white/10">
                <div class="flex justify-between items-center mb-6">
                    <h3 id="modal-title" class="text-lg font-bold">Neuer Eintrag</h3>
                    <label class="px-4 py-2 bg-white/10 rounded-xl cursor-pointer text-[10px] font-bold uppercase"><input type="file" accept="image/*" capture="environment" class="hidden" onchange="window.handleScan(event)">Beleg Scan</label>
                </div>
                <div class="space-y-4">
                    <input type="text" id="input-title" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-sm" placeholder="Bezeichnung">
                    <input type="number" id="input-amount" step="0.05" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-sm" placeholder="Betrag (CHF)">
                    
                    <div id="recurring-toggle-container" class="hidden flex items-center gap-3 px-2">
                        <input type="checkbox" id="input-recurring-check" onchange="window.toggleRecurringFields()" class="w-5 h-5 accent-blue-500">
                        <label for="input-recurring-check" class="text-xs font-bold uppercase">Fix jeden Monat</label>
                    </div>

                    <div id="date-container">
                        <label class="text-[9px] uppercase text-slate-500 ml-2">Datum</label>
                        <input type="date" id="input-date" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-sm">
                    </div>
                    <div id="day-container" class="hidden">
                        <label class="text-[9px] uppercase text-slate-500 ml-2">Tag im Monat (1-31)</label>
                        <input type="number" id="input-day" min="1" max="31" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-sm" placeholder="1">
                    </div>
                </div>
                <div class="mt-8 flex gap-3">
                    <button onclick="closeModal()" class="flex-1 py-4 text-sm font-bold text-slate-500">Abbrechen</button>
                    <button onclick="saveItem()" class="flex-1 py-4 blue-gradient rounded-xl text-sm font-bold">Hinzufügen</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
