<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeinBudget</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tesseract OCR Library (Lokal im Browser, ohne KI-Cloud) -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase-Konfiguration
        const firebaseConfig = {
            apiKey: "AIzaSyAvkTQNolf85Q-_WZiC_HrLNYJ2DArBVvo",
            authDomain: "meinbudget-bca94.firebaseapp.com",
            projectId: "meinbudget-bca94",
            storageBucket: "meinbudget-bca94.firebasestorage.app",
            messagingSenderId: "66530115679",
            appId: "1:66530115679:web:f07803aa3a9e068e205bea"
        };

        // Firebase initialisieren
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'meinbudget-bca94';

        // Status der App
        let currentUser = null;
        let transactions = [];
        let activeTab = 'einnahmen';
        let isScanning = false;

        // Globale Stile
        const style = document.createElement('style');
        style.textContent = `
            @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
            body {
                font-family: 'Plus Jakarta Sans', sans-serif;
                background-color: #000000;
                color: #ffffff;
            }
            .glass {
                background: rgba(23, 23, 23, 0.8);
                backdrop-filter: blur(12px);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
            .blue-gradient {
                background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            }
            .blue-glow {
                box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
            }
            .custom-scrollbar::-webkit-scrollbar {
                width: 4px;
            }
            .custom-scrollbar::-webkit-scrollbar-track {
                background: transparent;
            }
            .custom-scrollbar::-webkit-scrollbar-thumb {
                background: #334155;
                border-radius: 10px;
            }
            .no-scrollbar::-webkit-scrollbar {
                display: none;
            }
            .no-scrollbar {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
        `;
        document.head.appendChild(style);

        // Benachrichtigungs-System
        window.showNotification = function(msg, type = "info") {
            const toast = document.createElement('div');
            toast.className = `fixed top-10 left-1/2 -translate-x-1/2 px-6 py-3 rounded-2xl glass border-l-4 z-[300] shadow-2xl transition-all duration-500 transform translate-y-[-20px] opacity-0 ${type === 'error' ? 'border-rose-500' : 'border-blue-500'}`;
            toast.innerHTML = `<span class="text-sm font-bold text-white text-center">${msg}</span>`;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.remove('translate-y-[-20px]', 'opacity-0');
            }, 10);
            
            setTimeout(() => {
                toast.classList.add('translate-y-[-20px]', 'opacity-0');
                setTimeout(() => toast.remove(), 500);
            }, 5000);
        };

        // Authentifizierung
        window.login = async function() {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Login popup failed", error);
                showNotification("Anmeldung fehlgeschlagen.", "error");
            }
        };

        window.logout = async function() {
            try {
                await signOut(auth);
                window.location.reload();
            } catch (error) {
                console.error("Logout failed", error);
            }
        };

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                }
            } catch (e) {
                console.error("Auth Init Error", e);
            }
        };
        initAuth();

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            const loginScreen = document.getElementById('login-screen');
            const mainApp = document.getElementById('main-app');
            
            if (user) {
                loginScreen.classList.add('hidden');
                mainApp.classList.remove('hidden');
                document.getElementById('user-name').innerText = user.displayName || 'User';
                document.getElementById('user-img').src = user.photoURL || 'https://via.placeholder.com/40';
                subscribeToData();
            } else {
                loginScreen.classList.remove('hidden');
                mainApp.classList.add('hidden');
            }
        });

        // Daten laden
        function subscribeToData() {
            if (!currentUser) return;
            const q = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'transactions');
            onSnapshot(q, (snapshot) => {
                transactions = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                render();
            }, (error) => {
                console.error("Firestore Snapshot error:", error);
            });
        }

        // Bild verarbeiten (Preprocessing für OCR)
        async function preprocessImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        // Höhere Auflösung für OCR behalten
                        const MAX_WIDTH = 1500; 
                        let width = img.width;
                        let height = img.height;

                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        
                        // Graustufen-Filter für besseres OCR
                        ctx.filter = 'grayscale(1) contrast(1.2)';
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        resolve(canvas.toDataURL('image/jpeg', 0.9));
                    };
                };
            });
        }

        // Klassische OCR Erkennung ohne AI Cloud
        async function runOCR(imageData) {
            const worker = await Tesseract.createWorker('deu');
            const { data: { text } } = await worker.recognize(imageData);
            await worker.terminate();
            
            console.log("Erkannter Text:", text);

            // Parsing Logik
            const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 2);
            
            // 1. Händler finden (meist erste Zeile)
            const storeName = lines[0] || "Unbekannter Händler";

            // 2. Preise finden (Suche nach Zahlen im Format XX.XX)
            const priceRegex = /\d+[\.,]\d{2}/g;
            const priceMatches = text.match(priceRegex);
            
            let totalAmount = 0;
            if (priceMatches) {
                // Den höchsten Betrag nehmen (meistens das Total auf Quittungen)
                const numericPrices = priceMatches.map(p => parseFloat(p.replace(',', '.')));
                totalAmount = Math.max(...numericPrices);
            }

            return {
                title: storeName,
                amount: totalAmount,
                category: 'rechnungen'
            };
        }

        // Scan Handler
        window.handleScan = async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            setScanning(true);
            
            try {
                const processedImg = await preprocessImage(file);
                const data = await runOCR(processedImg);
                
                if (data && data.amount > 0) {
                    const newItem = {
                        title: data.title,
                        amount: data.amount,
                        type: 'archiv', 
                        date: new Date().toISOString().split('T')[0],
                        paid: true,
                        paidAt: new Date().toISOString(),
                        createdAt: new Date().toISOString()
                    };
                    
                    await addDoc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'transactions'), newItem);
                    closeModal();
                    showNotification(`Beleg erkannt: ${data.title} - CHF ${data.amount.toFixed(2)}`);
                } else {
                    showNotification("Beleg lesbar, aber kein Betrag gefunden.", "error");
                }
            } catch (e) {
                console.error("OCR Fehler:", e);
                showNotification("Fehler beim Lesen des Belegs.", "error");
            } finally {
                setScanning(false);
                event.target.value = ''; 
            }
        };

        function setScanning(val) {
            isScanning = val;
            const loader = document.getElementById('scan-loader');
            if (val) loader.classList.remove('hidden');
            else loader.classList.add('hidden');
        }

        // CRUD Aktionen
        window.saveItem = async () => {
            if (!currentUser) return;
            const title = document.getElementById('input-title').value;
            const amount = parseFloat(document.getElementById('input-amount').value);
            const date = document.getElementById('input-date').value;

            if (!title || isNaN(amount)) return;

            const newItem = {
                title,
                amount,
                type: activeTab,
                date: date || new Date().toISOString().split('T')[0],
                paid: false,
                createdAt: new Date().toISOString()
            };

            await addDoc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'transactions'), newItem);
            closeModal();
            showNotification("Gespeichert.");
        };

        window.deleteItem = async (id) => {
            if(confirm("Eintrag wirklich löschen?")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'transactions', id));
                showNotification("Gelöscht.");
            }
        };

        window.markAsPaid = async (id) => {
            const itemRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'transactions', id);
            await updateDoc(itemRef, { type: 'archiv', paid: true, paidAt: new Date().toISOString() });
            showNotification("Bezahlt & Archiviert.");
        };

        window.switchTab = (tab) => {
            activeTab = tab;
            render();
        };

        window.openModal = () => {
            if (activeTab === 'archiv' || activeTab === 'ubersicht') return;
            document.getElementById('modal-overlay').classList.remove('hidden');
            document.getElementById('modal-title').innerText = {
                'einnahmen': 'Neue Einnahme',
                'fixkosten': 'Neue Fixkosten',
                'rechnungen': 'Offene Rechnung',
                'sparen': 'Sparziel'
            }[activeTab];
            document.getElementById('input-date').value = new Date().toISOString().split('T')[0];
        };

        window.closeModal = () => {
            document.getElementById('modal-overlay').classList.add('hidden');
            document.getElementById('input-title').value = '';
            document.getElementById('input-amount').value = '';
        };

        const formatCHF = (val) => val.toLocaleString('de-CH', { style: 'currency', currency: 'CHF' });

        // UI Rendering
        function render() {
            const listContainer = document.getElementById('list-container');
            const addBtn = document.getElementById('add-btn');
            
            const sums = { einnahmen: 0, fixkosten: 0, rechnungen: 0, sparen: 0 };
            transactions.forEach(t => {
                if (sums[t.type] !== undefined) sums[t.type] += t.amount;
            });
            const potential = sums.einnahmen - sums.fixkosten - sums.rechnungen - sums.sparen;

            document.getElementById('display-income').innerText = formatCHF(sums.einnahmen);
            document.getElementById('display-potential').innerText = formatCHF(potential);

            document.querySelectorAll('.tab-btn').forEach(btn => {
                const tab = btn.getAttribute('data-tab');
                if (tab === activeTab) {
                    btn.className = "tab-btn px-4 py-2 rounded-xl text-sm font-semibold blue-gradient text-white blue-glow transition-all flex-shrink-0";
                } else {
                    btn.className = "tab-btn px-4 py-2 rounded-xl text-sm font-medium text-slate-400 hover:bg-white/5 transition-all flex-shrink-0";
                }
            });

            if (activeTab === 'ubersicht') {
                addBtn.classList.add('hidden');
                renderOverview(listContainer);
                return;
            } else {
                addBtn.classList.remove('hidden');
            }

            const filtered = transactions
                .filter(t => t.type === activeTab)
                .sort((a, b) => new Date(b.date) - new Date(a.date));

            if (filtered.length === 0) {
                listContainer.innerHTML = `<div class="flex flex-col items-center justify-center py-20 text-slate-600"><p>Keine Einträge vorhanden.</p></div>`;
                return;
            }

            listContainer.innerHTML = filtered.map(t => `
                <div class="glass p-5 rounded-2xl flex items-center justify-between group hover:border-blue-500/50 transition-all mb-3">
                    <div class="flex-1">
                        <h4 class="font-bold text-slate-100">${t.title}</h4>
                        <div class="flex items-center gap-3 mt-1 text-xs text-slate-500">
                            <span class="text-blue-400 font-semibold">${formatCHF(t.amount)}</span>
                            <span>• ${new Date(t.date).toLocaleDateString('de-CH')}</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        ${activeTab === 'rechnungen' ? `
                            <button onclick="markAsPaid('${t.id}')" class="p-2.5 bg-emerald-500/10 text-emerald-500 rounded-xl hover:bg-emerald-500 transition-all">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
                            </button>
                        ` : ''}
                        <button onclick="deleteItem('${t.id}')" class="p-2.5 bg-rose-500/10 text-rose-500 rounded-xl hover:bg-rose-500 transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function renderOverview(container) {
            const monthlyData = {};
            transactions.forEach(t => {
                const date = new Date(t.date);
                const month = date.toLocaleString('de-CH', { month: 'long', year: 'numeric' });
                if (!monthlyData[month]) monthlyData[month] = { income: 0, expenses: 0 };
                
                if (t.type === 'einnahmen') monthlyData[month].income += t.amount;
                else if (t.type !== 'archiv' || (t.type === 'archiv' && t.paidAt)) {
                    monthlyData[month].expenses += t.amount;
                }
            });

            const sortedMonths = Object.keys(monthlyData).sort((a, b) => new Date(b) - new Date(a));

            if (sortedMonths.length === 0) {
                container.innerHTML = `<p class="text-center text-slate-500 py-10">Keine Daten verfügbar.</p>`;
                return;
            }

            container.innerHTML = sortedMonths.map(month => {
                const data = monthlyData[month];
                const balance = data.income - data.expenses;
                return `
                    <div class="glass p-6 rounded-3xl border-l-4 ${balance >= 0 ? 'border-emerald-500' : 'border-rose-500'} mb-4">
                        <h3 class="text-xl font-bold mb-4 text-white">${month}</h3>
                        <div class="grid grid-cols-3 gap-4 text-center">
                            <div><p class="text-[10px] text-slate-500 uppercase">Einnahmen</p><p class="font-bold text-emerald-400">${formatCHF(data.income)}</p></div>
                            <div><p class="text-[10px] text-slate-500 uppercase">Ausgaben</p><p class="font-bold text-rose-400">${formatCHF(data.expenses)}</p></div>
                            <div><p class="text-[10px] text-slate-500 uppercase">Bilanz</p><p class="font-bold text-white">${formatCHF(balance)}</p></div>
                        </div>
                    </div>
                `;
            }).join('');
        }
    </script>
</head>
<body class="custom-scrollbar overflow-x-hidden">

    <!-- Ladebildschirm für OCR -->
    <div id="scan-loader" class="fixed inset-0 z-[200] bg-black/80 backdrop-blur-md hidden flex flex-col items-center justify-center">
        <div class="w-24 h-24 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-6"></div>
        <h2 class="text-xl font-bold text-white text-center px-6">Texterkennung läuft...</h2>
        <p class="text-slate-400 mt-2">Daten werden ohne KI lokal verarbeitet</p>
    </div>

    <!-- Login Screen -->
    <div id="login-screen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center p-6 bg-black text-white">
        <div class="w-20 h-20 blue-gradient rounded-3xl mb-8 blue-glow flex items-center justify-center animate-pulse">
            <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </div>
        <h1 class="text-4xl font-extrabold mb-2 tracking-tight">Mein<span class="text-blue-500">Budget</span></h1>
        <p class="text-slate-500 mb-10 text-center max-w-xs">Verwalte deine Finanzen modern und übersichtlich.</p>
        <button onclick="window.login()" class="flex items-center gap-3 px-8 py-4 bg-white text-black font-bold rounded-2xl hover:bg-slate-200 transition-all shadow-lg active:scale-95">
            <svg class="w-6 h-6" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/><path fill="none" d="M1 1h22v22H1z"/></svg>
            Anmelden mit Google
        </button>
    </div>

    <!-- Haupt App -->
    <div id="main-app" class="hidden min-h-screen">
        <nav class="max-w-5xl mx-auto px-6 py-6 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 blue-gradient rounded-xl flex items-center justify-center">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                </div>
                <span class="font-bold text-xl text-white">Mein<span class="text-blue-500">Budget</span></span>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex flex-col items-end">
                    <span id="user-name" class="text-xs md:text-sm font-semibold text-white">Username</span>
                    <button onclick="window.logout()" class="text-[10px] md:text-xs text-blue-400 font-bold hover:text-blue-300 underline">Abmelden</button>
                </div>
                <img id="user-img" class="w-8 h-8 md:w-10 md:h-10 rounded-full border border-white/10" src="" alt="User">
            </div>
        </nav>

        <main class="max-w-5xl mx-auto px-6 pb-24">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-10">
                <div class="glass p-8 rounded-[2rem]">
                    <p class="text-slate-500 text-sm uppercase tracking-widest mb-2">Einnahmen total</p>
                    <h2 id="display-income" class="text-4xl font-black text-white">CHF 0.00</h2>
                </div>
                <div class="blue-gradient p-8 rounded-[2rem] blue-glow text-white">
                    <p class="text-white/70 text-sm uppercase tracking-widest mb-2">Sparpotenzial</p>
                    <h2 id="display-potential" class="text-4xl font-black">CHF 0.00</h2>
                </div>
            </div>

            <div class="flex items-center gap-1 overflow-x-auto pb-4 no-scrollbar mb-6">
                <button onclick="switchTab('einnahmen')" data-tab="einnahmen" class="tab-btn px-4 py-2 rounded-xl text-sm font-semibold blue-gradient text-white">Einnahmen</button>
                <button onclick="switchTab('fixkosten')" data-tab="fixkosten" class="tab-btn px-4 py-2 rounded-xl text-sm font-medium text-slate-400">Fixkosten</button>
                <button onclick="switchTab('rechnungen')" data-tab="rechnungen" class="tab-btn px-4 py-2 rounded-xl text-sm font-medium text-slate-400">Rechnungen</button>
                <button onclick="switchTab('sparen')" data-tab="sparen" class="tab-btn px-4 py-2 rounded-xl text-sm font-medium text-slate-400">Sparen</button>
                <button onclick="switchTab('archiv')" data-tab="archiv" class="tab-btn px-4 py-2 rounded-xl text-sm font-medium text-slate-400">Archiv</button>
                <button onclick="switchTab('ubersicht')" data-tab="ubersicht" class="tab-btn px-4 py-2 rounded-xl text-sm font-medium text-slate-400">Übersicht</button>
            </div>

            <div id="list-container" class="space-y-3"></div>
        </main>

        <button id="add-btn" onclick="openModal()" class="fixed bottom-8 right-8 w-16 h-16 blue-gradient rounded-full blue-glow flex items-center justify-center text-3xl shadow-2xl transition-all z-40 active:scale-90">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"></path></svg>
        </button>

        <div id="modal-overlay" class="fixed inset-0 bg-black/90 backdrop-blur-sm z-50 flex items-end md:items-center justify-center hidden p-0 md:p-6">
            <div class="bg-[#111] w-full max-w-lg p-8 rounded-t-[2.5rem] md:rounded-[2.5rem] border-t border-white/10 text-white">
                <div class="flex justify-between items-center mb-8">
                    <h3 id="modal-title" class="text-2xl font-bold">Eintrag</h3>
                    <label class="flex items-center gap-2 px-4 py-2 bg-white/10 rounded-xl cursor-pointer hover:bg-white/20 transition-all">
                        <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
                        <span class="text-xs font-bold uppercase tracking-widest">Scan (OCR)</span>
                        <input type="file" accept="image/*" capture="environment" class="hidden" onchange="window.handleScan(event)">
                    </label>
                </div>
                <div class="space-y-6">
                    <div>
                        <label class="block text-xs text-slate-500 uppercase mb-2">Bezeichnung</label>
                        <input type="text" id="input-title" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none focus:border-blue-500" placeholder="Migros, Miete...">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs text-slate-500 uppercase mb-2">Betrag (CHF)</label>
                            <input type="number" id="input-amount" step="0.05" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none focus:border-blue-500" placeholder="0.00">
                        </div>
                        <div>
                            <label class="block text-xs text-slate-500 uppercase mb-2">Datum</label>
                            <input type="date" id="input-date" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none focus:border-blue-500">
                        </div>
                    </div>
                </div>
                <div class="mt-10 flex gap-4">
                    <button onclick="closeModal()" class="flex-1 py-4 font-bold text-slate-400 hover:text-white transition-all">Abbrechen</button>
                    <button onclick="saveItem()" class="flex-1 py-4 blue-gradient rounded-2xl font-bold text-white shadow-lg active:scale-95">Speichern</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
